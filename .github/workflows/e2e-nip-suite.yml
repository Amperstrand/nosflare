name: e2e-nip-suite

on:
  schedule:
    - cron: '17 4 * * *'
  workflow_dispatch:

jobs:
  e2e:
    name: NIP e2e against relay.cashu.email
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout e2e-tests branch
        uses: actions/checkout@v4
        with:
          ref: e2e-tests

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install deps
        run: npm install --no-audit --no-fund

      - name: Run e2e NIP suite
        run: npm run test:e2e
        env:
          CF_D1_API_TOKEN: ${{ secrets.CF_D1_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          NOSFLARE_D1_UUID: ${{ secrets.NOSFLARE_D1_UUID }}
